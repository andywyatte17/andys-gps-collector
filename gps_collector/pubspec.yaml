name: gps_collector
description: GPS track collector for running with OpenStreetMap display.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  intl: ^0.20.1
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  geolocator_android: ^4.6.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
